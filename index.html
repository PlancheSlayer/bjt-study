<!-- Storage shim: mimics the Claude artifact window.storage API using localStorage, -->
<!-- so this app works as a fully offline, standalone page with no Claude account needed. -->
<script>
(function () {
  function nsKey(key, shared) {
    return (shared ? "shared:" : "priv:") + key;
  }
  window.storage = {
    async get(key, shared) {
      const raw = localStorage.getItem(nsKey(key, !!shared));
      if (raw === null) throw new Error("Key not found: " + key);
      return { key: key, value: raw, shared: !!shared };
    },
    async set(key, value, shared) {
      localStorage.setItem(nsKey(key, !!shared), value);
      return { key: key, value: value, shared: !!shared };
    },
    async delete(key, shared) {
      localStorage.removeItem(nsKey(key, !!shared));
      return { key: key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const pfx = nsKey(prefix || "", !!shared);
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf(pfx) === 0) keys.push(k.slice((shared ? "shared:" : "priv:").length));
      }
      return { keys: keys, prefix: prefix, shared: !!shared };
    }
  };
})();
</script>
